<div class="wrapper">
  <h2 class="text">
    For resetting your password please write your email address:
  </h2>
  <div class="input-wrapper">
    <input
      class="input"
      type="email"
      [formControl]="email"
      placeholder="Email"
    />
    <button class="primary-btn btn-small" (click)="submit()">Send</button>
  </div>
  <p>{{ message }}</p>
</div>
