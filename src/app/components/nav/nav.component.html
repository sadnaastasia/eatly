<nav class="nav">
  <div [class]="isMenuOpen ? 'overlay' : 'overlay-none'"></div>
  <div class="nav-main mb25">
    <div class="nav-section">
      <a
        routerLink=""
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="logo-btn mr100"
      >
        <img class="mr10" src="logo.svg" alt="logo" /><span>eatly</span>
      </a>
      <a routerLink="menu" routerLinkActive="active" class="nav-btn mr50"
        >Menu</a
      >
      <a class="nav-btn mr50">Blog</a>
      <a class="nav-btn mr50">Pricing</a>
      <a class="nav-btn">Contacts</a>
    </div>
    <div class="nav-section">
      @if (!authService.isAuth) {
        <a class="cart-button mr18">
          <img src="shopping_cart.svg" alt="" />
        </a>
        <a routerLink="login" class="login-btn mr18">Login</a>
        <a routerLink="register" class="primary-btn">Sign up</a>
      } @else {
        <a class="cart-button mr18">
          <img src="shopping_cart.svg" alt="" />
        </a>
        <button (click)="logout()" class="primary-btn">Log out</button>
      }
    </div>
    <div class="burger-menu" (click)="toggleMenu()">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="30"
        height="30"
        fill="#908F8F"
        class="bi bi-list"
        viewBox="0 0 16 16"
      >
        <path
          fill-rule="evenodd"
          d="M2.5 12a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5m0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5m0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5"
        />
      </svg>
    </div>
  </div>
  <hr class="nav-line" />
</nav>
<div class="sidebar" [class.open]="isMenuOpen">
  <div class="sidebar-nav">
    <button class="close" (click)="toggleMenu()">✕</button>
  </div>
  <ul class="sidebar-menu">
    <a
      routerLink=""
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      class="sidebar-btn"
      >Main Page</a
    >
    <a routerLink="menu" routerLinkActive="active" class="sidebar-btn">Menu</a>
    <a class="sidebar-btn">Blog</a>
    <a class="sidebar-btn">Pricing</a>
    <a class="sidebar-btn">Contacts</a>
  </ul>
</div>
<router-outlet></router-outlet>
