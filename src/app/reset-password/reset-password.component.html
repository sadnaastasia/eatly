<div class="wrapper">
  <h2 class="text">Write new password:</h2>
  <div>
    <input
      class="input"
      type="password"
      [formControl]="password"
      placeholder="Password"
    />
    <button class="btn-small" (click)="submit()">Change password</button>
  </div>
  <p>{{ message }}</p>
</div>
